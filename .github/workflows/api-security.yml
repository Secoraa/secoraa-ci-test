name: API Security Scan

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  security-events: write
  contents: read

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Secoraa API Security Scan
        uses: Secoraa/Secoraa-platform@main
        with:
          target-url: https://secoraa-backend.onrender.com
          openapi-spec: ./openapi.json
          severity-threshold: HIGH
          fail-on-findings: 'false'
          secoraa-api-key: ${{ secrets.SECORAA_API_KEY }}
          secoraa-url: ${{ secrets.SECORAA_PLATFORM_URL }}

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: secoraa-results.sarif
